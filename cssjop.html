<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Delicious Recipe</h1>
    </header>
    <main>
        <section class="recipe-hero">
            <img src="https://via.placeholder.com/600x400" alt="Delicious Recipe Image">
            <div class="hero-text">
                <h2>Dish Name</h2>
                <p>A short, enticing description of the dish.</p>
            </div>
        </section>

        <section class="ingredients">
            <h3>Ingredients</h3>
            <ul>
                <li>Ingredient 1</li>
                <li>Ingredient 2</li>
                <li>Ingredient 3</li>
            </ul>
        </section>

        <section class="instructions">
            <h3>Instructions</h3>
            <ol>
                <li>Step 1</li>
                <li>Step 2</li>
                <li>Step 3</li>
            </ol>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Recipe Page</p>
    </footer>
</body>
</html>
